<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | ZARIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- HIGH-CONTRAST ORIGINAL ZARIA COLORS --- */
        :root {
            --bg-wine: #5b1d2a;       
            --bg-wine-dark: #3a1119;  
            --text-gold: #c69c6d;     
            --text-pink: #f9f0f0;     
            --text-muted: #d0b8bc;    
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-wine); color: var(--text-pink); min-height: 100vh; display: flex; flex-direction: column; }
        
        /* --- PRELOADER --- */
        #zaria-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-wine-dark); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.8s ease, visibility 0.8s ease; }
        #zaria-loader.hidden { opacity: 0; visibility: hidden; }
        .loader-logo { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--text-gold); letter-spacing: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(0.95); opacity: 0.7; } 50% { transform: scale(1.05); opacity: 1; } }

        /* --- HEADER & TICKER --- */
        .announcement-bar { background-color: rgba(0, 0, 0, 0.4); padding: 10px 0; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid rgba(208, 184, 188, 0.1); overflow: hidden; white-space: nowrap; position: relative; display: flex; align-items: center; }
        .scrolling-text { display: inline-block; animation: scroll-left 25s linear infinite; }
        .scrolling-text span { margin-right: 50px; color: var(--text-gold); font-weight: 600; }
        @keyframes scroll-left { 0% { transform: translateX(0%); } 100% { transform: translateX(-50%); } }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background-color: var(--bg-wine); }
        .logo-container { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .logo-circle { width: 40px; height: 40px; background-color: var(--text-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: var(--bg-wine); font-weight: bold;}
        .logo-text h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--text-gold); letter-spacing: 2px; }
        
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; transition: color 0.3s; font-weight: 600; }
        .nav-links a:hover { color: var(--text-pink); }
        
        .header-icons { display: flex; gap: 20px; font-size: 1.2rem; color: var(--text-muted); align-items: center; }
        
        /* --- CART LAYOUT --- */
        .cart-wrapper { padding: 40px 5% 80px; flex: 1; }
        .cart-title { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--text-gold); margin-bottom: 40px; }
        .cart-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 50px; }
        
        .cart-header { display: grid; grid-template-columns: 2fr 1fr 1fr; padding-bottom: 20px; border-bottom: 1px solid rgba(208, 184, 188, 0.2); color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Dynamic Cart Items Container - Empty for now */
        .cart-items-container { min-height: 200px; }
        
        .cart-summary { background: var(--bg-wine-dark); padding: 30px; border-radius: 12px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--text-pink); }
        .summary-total { display: flex; justify-content: space-between; font-weight: 700; color: var(--text-gold); font-size: 1.2rem; margin-top: 20px; border-top: 1px solid rgba(208, 184, 188, 0.2); padding-top: 20px;}
        
        .btn-checkout { display: block; text-align: center; background: var(--text-gold); color: var(--bg-wine-dark); padding: 15px; text-decoration: none; font-weight: 700; border-radius: 4px; margin-top: 20px; transition: 0.3s; }
        .btn-checkout:hover { background: #dfba8c; }
        
        .zaria-footer { background-color: var(--bg-wine-dark); padding: 40px 5%; text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: auto; border-top: 1px solid rgba(208, 184, 188, 0.1); }
    </style>
</head>
<body>

    <div id="zaria-loader"><div class="loader-logo">ZARIA</div></div>

    <div class="announcement-bar">
        <div class="scrolling-text">
            <span>+ FREE SHIPPING ON ORDERS ABOVE ₹2,499</span>
            <span>+ HANDCRAFTED WITH LOVE IN INDIA</span>
        </div>
    </div>

    <header class="header">
        <div class="logo-container" onclick="window.location.href='index.html'">
            <div class="logo-circle">Z</div>
            <div class="logo-text"><h1>ZARIA</h1></div>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a><a href="products.html">Shop</a><a href="contact.html">Contact</a>
        </nav>
        <div class="header-icons"><a href="cart.html" style="color: var(--text-gold);"><i class="fa-solid fa-bag-shopping"></i></a></div>
    </header>

    <main class="cart-wrapper">
        <h2 class="cart-title">Your Shopping Cart</h2>
        <div class="cart-layout">
            <div class="cart-items-container" id="cart-items">
                <div class="cart-header"><span>Product</span><span>Quantity</span><span>Total</span></div>
                </div>
            
            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
                <div class="summary-total"><span>Total</span><span id="total">₹0</span></div>
                <a href="checkout.html" class="btn-checkout">Proceed to Checkout</a>
            </div>
        </div>
    </main>

    <footer class="zaria-footer"><p>&copy; 2026 ZARIA. All Rights Reserved.</p></footer>

    <script src="script.js"></script>
    <script>
        // Ensure this triggers the database fetch on load
        document.addEventListener("DOMContentLoaded", renderCart);
    </script>
</body>
</html>
