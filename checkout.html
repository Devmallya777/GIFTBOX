<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | ZARIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg-wine: #5b1d2a; --bg-wine-dark: #3a1119; --text-gold: #c69c6d; --text-pink: #f9f0f0; --text-muted: #d0b8bc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-wine); color: var(--text-pink); min-height: 100vh; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: center; padding: 25px 5%; background-color: var(--bg-wine); }
        .logo-container { text-align: center; cursor: pointer; }
        .logo-circle { width: 40px; height: 40px; background-color: var(--text-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--bg-wine); font-weight: bold; margin: 0 auto 5px; }
        .logo-text h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--text-gold); letter-spacing: 2px; }
        .logo-text span { font-size: 0.65rem; letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase; }
        
        .checkout-wrapper { padding: 40px 5% 80px; flex: 1; max-width: 1200px; margin: 0 auto; width: 100%; }
        .checkout-layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 50px; }
        .form-section { background: var(--bg-wine-dark); padding: 30px; border-radius: 12px; margin-bottom: 30px; border: 1px solid rgba(208, 184, 188, 0.1); }
        .form-section h3 { margin-bottom: 20px; font-family: 'Playfair Display', serif; color: var(--text-gold); }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--text-muted); color: var(--text-pink); border-radius: 4px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--text-gold); }
        
        .checkout-summary { background: var(--bg-wine-dark); padding: 30px; border-radius: 12px; height: fit-content; border: 1px solid rgba(208, 184, 188, 0.1); }
        .summary-divider { height: 1px; background: rgba(208, 184, 188, 0.2); margin: 20px 0; }
        .summary-row { display: flex; justify-content: space-between; margin: 10px 0; color: var(--text-pink); }
        .summary-total { display: flex; justify-content: space-between; font-weight: 700; color: var(--text-gold); font-size: 1.5rem; margin-top: 20px; border-top: 1px solid rgba(208, 184, 188, 0.2); padding-top: 20px; }
        
        .btn-go-back { background: none; border: none; color: var(--text-gold); cursor: pointer; padding: 15px 5% 0; font-size: 0.95rem; font-weight: 600; transition: 0.3s; text-align: left; display: inline-block; text-decoration: none; }
        .btn-go-back:hover { color: var(--text-pink); transform: translateX(-5px); }
        
        .btn-pay-now { width: 100%; padding: 15px; background: var(--text-gold); border: none; color: var(--bg-wine-dark); font-weight: 700; text-transform: uppercase; cursor: pointer; border-radius: 4px; font-size: 1rem; letter-spacing: 1px; transition: 0.3s; }
        .btn-pay-now:hover { background: #dfba8c; }
        @media (max-width: 768px) { .checkout-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-container" onclick="window.location.href='index.html'">
            <div class="logo-circle">Z</div>
            <div class="logo-text"><h1>ZARIA</h1><span>Secure Checkout</span></div>
        </div>
    </header>
    
    <a href="cart.html" class="btn-go-back"><i class="fa-solid fa-arrow-left"></i> Return to Cart</a>

    <main class="checkout-wrapper">
        <form id="zaria-payment-form" class="checkout-layout">
            <div class="checkout-forms">
                <section class="form-section">
                    <h3>Contact Information</h3>
                    <div class="input-group">
                        <input type="email" id="email" placeholder="Email Address" required>
                    </div>
                </section>
                
                <section class="form-section">
                    <h3>Shipping Address</h3>
                    <div class="input-group">
                        <input type="text" id="address" placeholder="Street Address" required>
                    </div>
                    <div class="input-group">
                        <input type="text" id="pin" placeholder="PIN Code" pattern="[0-9]{6}" title="Please provide a valid 6-digit PIN code" required>
                    </div>
                </section>
                
                <button type="submit" class="btn-pay-now" id="pay-btn">Complete Payment</button>
            </div>

            <aside class="checkout-summary">
                <h3 style="font-family: 'Playfair Display', serif; color: var(--text-gold); margin-bottom: 20px;">Order Summary</h3>
                <div id="checkout-items">
                    </div>
                <div class="summary-divider"></div>
                <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
                <div class="summary-row"><span>Shipping</span><span style="color: #5cb85c; font-weight: 600;">FREE</span></div>
                <div class="summary-total"><span>Total</span><span id="total">₹0</span></div>
            </aside>
        </form>
    </main>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="script.js"></script>
    <script>
        // Theme Guardian: Runs instantly on target initialization
        (function() {
            if (localStorage.getItem('zaria-dark-mode') === 'true') {
                document.body.classList.add('dark-mode');
            }
        })();

        document.addEventListener("DOMContentLoaded", () => {
            // Render the items safely from storage onto the side grid view
            if (typeof loadCheckoutSummary === "function") {
                loadCheckoutSummary();
            }

            // Prefill email field instantly if the user has an active session
            const userSession = localStorage.getItem("zaria_user");
            if (userSession) {
                try {
                    const parsedUser = JSON.parse(userSession);
                    if (parsedUser.email) {
                        document.getElementById("email").value = parsedUser.email;
                    }
                } catch (err) {
                    console.error("Error prefilling checking profile details:", err);
                }
            }

            // Handle Order Submission Pipeline Execution
            document.getElementById("zaria-payment-form").addEventListener("submit", async (e) => {
                e.preventDefault();

                const email = document.getElementById("email").value.trim();
                const streetAddress = document.getElementById("address").value.trim();
                const pinCode = document.getElementById("pin").value.trim();
                
                // Read the computed payment sum numbers directly from UI text
                const totalText = document.getElementById("total").innerText;
                const totalAmount = parseInt(totalText.replace(/[^\d]/g, ''));

                if (!totalAmount || totalAmount <= 0) {
                    alert("Your shopping cart is currently empty.");
                    window.location.href = "index.html";
                    return;
                }

                const fullShippingAddress = `${streetAddress}, PIN: ${pinCode}`;
                const payButton = document.getElementById("pay-btn");
                
                // Disable interface buttons to block dual submissions
                payButton.disabled = true;
                payButton.innerText = "Processing Transaction...";

                // Simulate Razorpay Callback Engine Loop Generation
                const randomPaymentId = "pay_rzp_" + Math.random().toString(36).substring(2, 15).toUpperCase();

                try {
                    const response = await fetch('/api/order', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            email: email,
                            total: totalAmount,
                            address: fullShippingAddress,
                            paymentId: randomPaymentId
                        })
                    });

                    const result = await response.json();

                    if (result.success) {
                        // 1. Wipe client fallback storage to sync states perfectly
                        localStorage.setItem("zaria-cart", JSON.stringify([]));
                        
                        alert(`Transaction Approved!\nOrder Confirmation #${result.orderId} sent successfully.`);
                        window.location.href = "index.html";
                    } else {
                        alert(result.message || "Order tracking registration dropped.");
                        payButton.disabled = false;
                        payButton.innerText = "Complete Payment";
                    }
                } catch (err) {
                    console.error("Checkout Request Error:", err);
                    alert("Unable to reach transaction processing nodes.");
                    payButton.disabled = false;
                    payButton.innerText = "Complete Payment";
                }
            });
        });
    </script>
</body>
</html>
