<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | ZARIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-wine: #5b1d2a; --bg-wine-dark: #3a1119; --text-gold: #c69c6d; --text-pink: #f9f0f0; --text-muted: #d0b8bc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-wine); color: var(--text-pink); min-height: 100vh; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: center; padding: 25px 5%; background-color: var(--bg-wine); }
        .logo-circle { width: 40px; height: 40px; background-color: var(--text-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--bg-wine); font-weight: bold; margin: 0 auto 5px; }
        .logo-text h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--text-gold); }
        
        .checkout-wrapper { padding: 40px 5% 80px; flex: 1; max-width: 1200px; margin: 0 auto; width: 100%; }
        .checkout-layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 50px; }
        .form-section { background: var(--bg-wine-dark); padding: 30px; border-radius: 12px; margin-bottom: 30px; border: 1px solid rgba(208, 184, 188, 0.1); }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--text-muted); color: var(--text-pink); border-radius: 4px; }
        
        .checkout-summary { background: var(--bg-wine-dark); padding: 30px; border-radius: 12px; height: fit-content; }
        .checkout-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .summary-row { display: flex; justify-content: space-between; margin: 10px 0; color: var(--text-pink); }
        .summary-total { font-weight: 700; color: var(--text-gold); font-size: 1.5rem; margin-top: 20px; }
        .btn-go-back { background: none; border: none; color: var(--text-gold); cursor: pointer; padding: 15px 5% 0; font-size: 0.95rem; font-weight: 600; transition: 0.3s; text-align: left; display: inline-block; }
        .btn-go-back:hover { color: var(--text-pink); transform: translateX(-5px); }
        
        .btn-pay-now { width: 100%; padding: 15px; background: var(--text-gold); border: none; color: var(--bg-wine-dark); font-weight: 700; text-transform: uppercase; cursor: pointer; border-radius: 4px; }
        @media (max-width: 768px) { .checkout-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-container" onclick="window.location.href='index.html'">
            <div class="logo-circle">Z</div>
            <div class="logo-text"><h1>ZARIA</h1><span>Secure Checkout</span></div>
        </div>
    </header>
    <button onclick="window.history.back()" class="btn-go-back"><i class="fa-solid fa-arrow-left"></i> Go Back</button>

    <main class="checkout-wrapper">
        <div class="checkout-layout">
            <div class="checkout-forms">
                <section class="form-section">
                    <h3>Contact Information</h3>
                    <div class="input-group"><input type="email" id="email" placeholder="Email Address" required></div>
                </section>
                <section class="form-section">
                    <h3>Shipping Address</h3>
                    <div class="input-group"><input type="text" id="address" placeholder="Street Address" required></div>
                    <div class="input-group"><input type="text" id="pin" placeholder="PIN Code" required></div>
                </section>
                <button class="btn-pay-now" id="pay-btn">Pay Now</button>
            </div>

            <aside class="checkout-summary">
                <div id="checkout-items">
                    </div>
                <div class="summary-divider"></div>
                <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
                <div class="summary-total"><span>Total</span><span id="total">₹0</span></div>
            </aside>
        </div>
    </main>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="script.js"></script>
</body>
<script>
        // Ensure this triggers the database fetch on load
        document.addEventListener("DOMContentLoaded", renderCheckout);
        // Theme Guardian: Runs instantly on every page load
    (function() {
        if (localStorage.getItem('zaria-dark-mode') === 'true') {
            document.body.classList.add('dark-mode');
        }
    })();
    </script>
</html>
