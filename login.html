<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Login | ZARIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div id="zaria-loader" class="zaria-loader">
        <div class="loader-logo">
            <div class="logo-circle" style="width: 60px; height: 60px; font-size: 1.5rem; margin: 0 auto 15px;">Z</div>
            <h1 style="color: var(--text-gold); font-family: 'Playfair Display', serif; letter-spacing: 3px; margin: 0;">ZARIA</h1>
            <p style="color: var(--text-muted); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 5px;">The Art of Gifting</p>
        </div>
    </div>

    <!-- MASTER HEADER -->
    <header class="header">
        <div class="logo-container">
            <a href="index.html" style="display: block; text-decoration: none;">
                <img src="logo.png" alt="ZARIA - The Art of Gifting" class="site-logo">
            </a>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
        <div class="header-icons" style="display: flex; gap: 20px; align-items: center; font-size: 1.2rem;">
            <div class="search-container" style="display: flex; align-items: center; position: relative;">
                <input type="text" id="nav-search-input" class="nav-search-input" placeholder="Search gifts...">
                <button id="nav-search-btn" title="Search" style="background: none; border: none; color: inherit; cursor: pointer; padding: 0;">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
            <a href="wishlist.html" title="Wishlist" style="color: inherit; text-decoration: none;"><i class="fa-regular fa-heart"></i></a>
            <a href="cart.html" title="Shopping Cart" style="color: inherit; text-decoration: none;"><i class="fa-solid fa-bag-shopping"></i></a>
            <a href="login.html" title="My Account" style="color: inherit; text-decoration: none;"><i class="fa-regular fa-user"></i></a>
            <button id="theme-toggle" style="background:none; border:none; cursor:pointer; color:inherit; margin-left: 10px;">🌙</button>
        </div>
    </header>

    <!-- BACK BUTTON -->
    <button onclick="window.history.back()" class="btn-go-back"><i class="fa-solid fa-arrow-left"></i> Go Back</button>

    <!-- LOGIN SECTION -->
    <main class="auth-wrapper">
        <div class="auth-box" id="login-box">
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Sign in to access your ZARIA account, track orders, and view your wishlist.</p>
            
            <form class="auth-form">
                <div class="input-group">
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>
                
                <div class="auth-extras">
                    <label class="custom-checkbox">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-auth">Sign In</button>
            </form>

            <div class="auth-switch">
                <p>Don't have an account? <a href="register.html">Create one here</a>.</p>
            </div>
        </div>

        <!-- THIS DIV SHOWS ONLY IF THEY ARE ALREADY LOGGED IN -->
        <div class="auth-box" id="logged-in-box" style="display: none; text-align: center;">
            <h2 class="auth-title">You are logged in!</h2>
            <p class="auth-subtitle">Welcome to your ZARIA VIP Account.</p>
            <button id="btn-logout" class="btn-auth" style="background-color: #333; margin-top: 20px;">Log Out</button>
        </div>
    </main>

    <!-- MASTER FOOTER -->
    <footer class="zaria-footer">
        <div class="footer-bottom" style="text-align: center; padding: 30px 0;">
            <p>&copy; 2026 ZARIA. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
