<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop All | ZARIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-wine: #5b1d2a; --bg-wine-dark: #3a1119;
            --text-gold: #c69c6d; --text-pink: #f9f0f0; --text-muted: #d0b8bc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-wine); color: var(--text-pink); min-height: 100vh; display: flex; flex-direction: column; }
        
        #zaria-loader { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-wine-dark); display:flex; justify-content:center; align-items:center; z-index:9999; transition:0.8s; }
        #zaria-loader.hidden { opacity:0; visibility:hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: var(--bg-wine); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        /* FIX: Ensure buttons register clicks */
        .product-card { background: var(--bg-wine-dark); border-radius: 12px; overflow: hidden; position: relative; }
        .product-image { height: 280px; background-size: cover; background-position: center; position: relative; }
        .hover-actions { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; gap:15px; opacity:0; background:rgba(0,0,0,0.4); transition:0.3s; z-index: 2; }
        .product-card:hover .hover-actions { opacity: 1; }
        .hover-actions button { z-index: 3; cursor: pointer; background: none; border: none; color: white; font-size: 1.2rem; }
        
        .product-info { padding: 20px; text-align: center; }
        .add-to-cart { width: 100%; padding: 10px; background: transparent; border: 2px solid var(--text-gold); color: var(--text-gold); border-radius: 20px; cursor: pointer; z-index: 3; position: relative; }
        .add-to-cart:hover { background: var(--text-gold); color: var(--bg-wine-dark); }
        
        .shop-wrapper { padding: 40px 5%; display: flex; gap: 40px; }
        .shop-main { flex: 1; }
    </style>
</head>
<body>

    <div id="zaria-loader"><div class="loader-logo" style="color:var(--text-gold); font-family: 'Playfair Display'; font-size: 3rem;">ZARIA</div></div>

    <header class="header">
        <div class="logo-container" onclick="window.location.href='index.html'" style="cursor:pointer; display:flex; align-items:center; gap:10px;">
            <div class="logo-circle" style="width:40px; height:40px; background:var(--text-gold); border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--bg-wine); font-weight:bold;">Z</div>
            <h1>ZARIA</h1>
        </div>
        <nav class="nav-links"><a href="index.html">Home</a><a href="products.html">Shop</a></nav>
    </header>

    <main class="shop-wrapper">
        <section class="shop-main">
            <div class="product-grid" id="product-grid">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        // Use a standard fetch that gracefully handles empty states
        async function loadProducts() {
            const grid = document.getElementById('product-grid');
            try {
                const res = await fetch('/api/products');
                if (!res.ok) throw new Error('API down');
                const products = await res.json();
                
                if (products.length === 0) {
                    grid.innerHTML = "<p>No products found in database.</p>";
                    return;
                }

                grid.innerHTML = products.map(p => `
                    <div class="product-card">
                        <div class="product-image" style="background-color: ${p.color || '#ccc'};">
                            <div class="hover-actions">
                                <button onclick="toggleWishlist('${p._id}')"><i class="fa-regular fa-heart"></i></button>
                                <button onclick="alert('Quick view')"><i class="fa-regular fa-eye"></i></button>
                            </div>
                        </div>
                        <div class="product-info">
                            <h4>${p.name}</h4>
                            <p class="price">₹${p.price}</p>
                            <button class="add-to-cart" onclick="addToCart('${p._id}', '${p.name}', ${p.price}, '${p.color}')">Add to Cart</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
                grid.innerHTML = "<p>Database connection failed. Ensure your backend is running.</p>";
            }
        }
        
        // Ensure this runs only once
        window.addEventListener('load', () => {
            loadProducts();
            const loader = document.getElementById('zaria-loader');
            if (loader) loader.classList.add('hidden');
        });
    </script>
</body>
</html>
