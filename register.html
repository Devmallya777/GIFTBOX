<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | ZARIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <!-- MASTER HEADER -->
    <header class="header">
        <div class="logo-container">
            <a href="index.html" style="display: block; text-decoration: none;">
                <img src="logo.png" alt="ZARIA - The Art of Gifting" class="site-logo">
            </a>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
        <div class="header-icons" style="display: flex; gap: 20px; align-items: center; font-size: 1.2rem;">
            <div class="search-container" style="display: flex; align-items: center; position: relative;">
                <input type="text" id="nav-search-input" class="nav-search-input" placeholder="Search gifts...">
                <button id="nav-search-btn" title="Search" style="background: none; border: none; color: inherit; cursor: pointer; padding: 0;">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
            <a href="wishlist.html" title="Wishlist" style="color: inherit; text-decoration: none;"><i class="fa-regular fa-heart"></i></a>
            <a href="cart.html" title="Shopping Cart" style="color: inherit; text-decoration: none;"><i class="fa-solid fa-bag-shopping"></i></a>
            <a href="login.html" title="My Account" style="color: inherit; text-decoration: none;"><i class="fa-regular fa-user"></i></a>
            <button id="theme-toggle" style="background:none; border:none; cursor:pointer; color:inherit; margin-left: 10px;">🌙</button>
        </div>
    </header>

    <!-- BACK BUTTON -->
    <button onclick="window.history.back()" class="btn-go-back"><i class="fa-solid fa-arrow-left"></i> Go Back</button>

    <!-- REGISTER SECTION -->
    <main class="auth-wrapper">
        <div class="auth-box">
            <h2 class="auth-title">Join ZARIA</h2>
            <p class="auth-subtitle">Create an account to track your orders, save your wishlist, and experience the fine art of gifting.</p>
            
            <form class="register-form">
                <div style="display: flex; gap: 15px;">
                    <div class="input-group" style="flex: 1;">
                        <input type="text" placeholder="First Name" required>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <input type="text" placeholder="Last Name" required>
                    </div>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Create Password" required>
                </div>
                
                <div class="auth-extras" style="justify-content: flex-start; margin-bottom: 20px;">
                    <label class="custom-checkbox">
                        <input type="checkbox" checked>
                        <span class="checkmark"></span>
                        Sign up for exclusive ZARIA offers and news
                    </label>
                </div>

                <button type="submit" class="btn-auth">Create Account</button>
            </form>

            <div class="auth-switch">
                <p>Already have an account? <a href="login.html">Sign in here</a>.</p>
            </div>
        </div>
    </main>

    <!-- MASTER FOOTER -->
    <footer class="zaria-footer">
        <div class="footer-bottom" style="text-align: center; padding: 30px 0;">
            <p>&copy; 2026 ZARIA. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
